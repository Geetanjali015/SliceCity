<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SliceCity</title>
    <link href="style.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body>
    <!---header section--->
    <header class="header">
        <a href="home.html" class="logo"><i class='bx bxs-pizza'></i>SliceCity</a>
        <ul class="navbar">
            <a href="home.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="menu.html">Menu</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact us</a>
        </ul>

        <div class="icons">
            <div id="cart" class="bx bxs-cart"></div>
            <div id="login" class="bx bxs-user"></div>
            <div id="menu" class="bx bx-menu"></div>   
        </div>

        <div class="cartone">

            <div class="box">
                <i class='bx bx-x'></i>
                <img src="pizza shop/pepporoni.jpeg" alt="">
                <div class="content">
                    <h3>pepporoni</h3>
                    <span class="quantity">1</span>
                    <span class="multiply">x</span>
                    <span class="price">Rs.560</span>
                </div>
            </div>

            <div class="box">
                <i class='bx bx-x'></i>
                <img src="pizza_shop/veg pizza.jpg" alt="">
                <div class="content">
                    <h3>veg delight</h3>
                    <span class="quantity">1</span>
                    <span class="multiply">x</span>
                    <span class="price">Rs.530</span>
                </div>
            </div>

            <div class="box">
                <i class='bx bx-x'></i>
                <img src="pizza shop/chicken_pizza.png" alt="">
                <div class="content">
                    <h3>chicken extraveganza</h3>
                    <span class="quantity">1</span>
                    <span class="multiply">x</span>
                    <span class="price">Rs.500</span>
                </div>
            </div>
            <h3 class="total">toltal: Rs.1590</h3>
            <a href="#" class="btn">checkout cart</a>
        </div>

    </header>
    <!---custom js link-->
    <script src="script.js"></script>
    
</body>
</html>
